<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denem Academy — Créer mon compte</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1E1B4B 0%,#4F46E5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:72px;height:72px;border-radius:16px;margin:0 auto 12px;overflow:hidden}
.logo-title{font-size:20px;font-weight:800;color:#1E293B}
.logo-sub{font-size:13px;color:#64748B;margin-top:4px}
.badge{display:inline-block;background:#EEF2FF;color:#4F46E5;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;color:#1E293B;outline:none;transition:border .2s;font-family:inherit;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:#4F46E5;box-shadow:0 0 0 3px #EEF2FF}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-primary{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,.4)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:#FEE2E2;color:#991B1B;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.error.show{display:block}
.success{background:#DCFCE7;color:#15803D;border-radius:12px;padding:20px;font-size:14px;text-align:center;display:none}
.success.show{display:block}
.success .s-icon{font-size:36px;margin-bottom:8px}
.success .s-title{font-weight:700;font-size:16px;margin-bottom:4px}
.footer-note{text-align:center;font-size:12px;color:#94A3B8;margin-top:20px}
.footer-note a{color:#4F46E5;text-decoration:none;font-weight:600}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1E1B4B,#4F46E5);display:flex;align-items:center;justify-content:center;z-index:100}
.loading-overlay.hidden{display:none}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.divider{display:flex;align-items:center;gap:10px;margin:6px 0 14px;color:#94A3B8;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E2E8F0}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
</div>

<div class="card" id="card" style="display:none">
  <div class="logo">
    <div class="logo-icon"><img src="../assets/logo.png" alt="Denem Academy" style="width:72px;height:72px;object-fit:cover;border-radius:16px"></div>
    <div class="logo-title">Denem Academy</div>
    <div class="logo-sub">Créez votre espace apprenant</div>
    <div class="badge">👤 Inscription apprenant</div>
  </div>

  <div id="form-section">
    <div class="form-row">
      <div class="form-group">
        <label>Prénom *</label>
        <input type="text" id="reg-prenom" placeholder="Camille" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label>Nom *</label>
        <input type="text" id="reg-nom" placeholder="Dupont" autocomplete="family-name">
      </div>
    </div>
    <div class="form-group">
      <label>Téléphone</label>
      <input type="tel" id="reg-tel" placeholder="06 12 34 56 78" autocomplete="tel">
    </div>
    <div class="divider">Identifiants de connexion</div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="reg-email" placeholder="votre@email.fr" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe *</label>
      <input type="password" id="reg-pwd" placeholder="Minimum 6 caractères" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe *</label>
      <input type="password" id="reg-pwd2" placeholder="Répétez le mot de passe" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" id="btn-register" onclick="doRegister()">Créer mon compte</button>
    <div class="error" id="reg-error"></div>
  </div>

  <div class="success" id="success-box">
    <div class="s-icon">🎉</div>
    <div class="s-title">Compte créé avec succès !</div>
    <div style="color:#166534;font-size:13px;margin-bottom:12px">Vous allez être redirigé vers votre espace…</div>
    <div style="width:40px;height:40px;border:3px solid #16A34A33;border-top-color:#16A34A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto"></div>
  </div>

  <div class="footer-note">
    Déjà un compte ? <a href="../login/">Se connecter</a>
  </div>
</div>

<script>
const FB={apiKey:"AIzaSyBdNN-iiK5KoBqkX4FX1PJ5CmlWUma8NaU",authDomain:"denem-academy-5de41.firebaseapp.com",projectId:"denem-academy-5de41",storageBucket:"denem-academy-5de41.firebasestorage.app",messagingSenderId:"570632584566",appId:"1:570632584566:web:ea9b964787b40805a7ce57"};
firebase.initializeApp(FB);
const auth=firebase.auth();
const db=firebase.firestore();

function getBase(){return location.pathname.startsWith('/suivi-apprenants')?'/suivi-apprenants':'';}

// If already logged in, redirect directly
auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      const doc=await db.collection("users").doc(user.uid).get();
      const role=doc.exists?doc.data().role:"student";
      const base=getBase();
      if(role==='admin')location.href=base+'/admin/';
      else if(role==='csm')location.href=base+'/';
      else location.href=base+'/student/';
    }catch(e){location.href=getBase()+'/student/';}
    return;
  }
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("card").style.display="";
});

async function doRegister(){
  const prenom=document.getElementById('reg-prenom').value.trim();
  const nom=document.getElementById('reg-nom').value.trim();
  const tel=document.getElementById('reg-tel').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pwd=document.getElementById('reg-pwd').value;
  const pwd2=document.getElementById('reg-pwd2').value;
  const err=document.getElementById('reg-error');
  const btn=document.getElementById('btn-register');

  // Validation
  if(!prenom||!nom||!email||!pwd){showError(err,'Veuillez remplir tous les champs obligatoires.');return;}
  if(pwd.length<6){showError(err,'Le mot de passe doit faire au moins 6 caractères.');return;}
  if(pwd!==pwd2){showError(err,'Les mots de passe ne correspondent pas.');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showError(err,'Email invalide.');return;}

  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Création en cours…';

  try{
    // 1. Create Firebase Auth account
    const cred=await auth.createUserWithEmailAndPassword(email,pwd);
    const uid=cred.user.uid;
    const now=firebase.firestore.FieldValue.serverTimestamp();

    // 2. Create users doc (role: student)
    await db.collection("users").doc(uid).set({
      prenom,nom,email,role:'student',createdAt:now
    });

    // 3. Auto-create apprenant record in Firestore
    await db.collection("apprenants").add({
      prenom,nom,email,
      telephone:tel||'',
      uid,
      statut:'En cours',
      cohorte:'',
      charge:'',
      jour:1,
      date_debut:new Date().toISOString().split('T')[0],
      objectif:'',
      modules_scores:[],
      couleur:'#4F46E5',
      createdAt:now,
      source:'auto-register'
    });

    // 4. Show success then redirect
    document.getElementById('form-section').style.display='none';
    document.getElementById('success-box').classList.add('show');
    setTimeout(()=>{location.href=getBase()+'/student/';},2000);

  }catch(e){
    showError(err,getFrError(e.code));
    btn.disabled=false;btn.textContent='Créer mon compte';
  }
}

function showError(el,msg){el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),5000);}
function getFrError(code){
  const m={
    'auth/email-already-in-use':'Un compte existe déjà avec cet email. <a href="../login/">Connectez-vous</a>.',
    'auth/invalid-email':'Adresse email invalide.',
    'auth/weak-password':'Mot de passe trop faible (minimum 6 caractères).',
    'auth/too-many-requests':'Trop de tentatives. Réessayez dans quelques minutes.',
    'auth/network-request-failed':'Erreur réseau. Vérifiez votre connexion.'
  };
  return m[code]||'Une erreur est survenue. Réessayez.';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
</script>
</body>
</html>
