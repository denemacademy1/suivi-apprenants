<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denem Academy — Mon espace</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sidebar-w:280px;
  --header-h:64px;
  --primary:#6366F1;
  --primary-dark:#4F46E5;
  --primary-light:#EEF2FF;
  --success:#10B981;
  --danger:#EF4444;
  --warning:#F59E0B;
  --bg:#F8FAFC;
  --card:#fff;
  --border:#E2E8F0;
  --text:#0F172A;
  --muted:#64748B;
  --sidebar-bg:#0F0E1F;
  --sidebar-border:rgba(255,255,255,.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh}

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;background:var(--sidebar-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.load-logo{width:64px;height:64px;border-radius:16px;overflow:hidden}
.load-logo img{width:100%;height:100%;object-fit:cover}
.load-text{color:rgba(255,255,255,.5);font-size:13px}
.load-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.load-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#8B5CF6);border-radius:2px;animation:loading 1.5s ease-in-out infinite}
@keyframes loading{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* ── HEADER ── */
.header{height:var(--header-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;z-index:50;position:relative}
.header-logo{display:flex;align-items:center;gap:10px;margin-right:auto}
.header-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover}
.header-logo-name{font-size:15px;font-weight:800;color:var(--text)}
.header-logo-name span{color:var(--primary)}
.header-prog{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--bg);border-radius:12px;border:1px solid var(--border)}
.header-prog-label{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap}
.prog-track{width:120px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),#8B5CF6);border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-pct{font-size:13px;font-weight:700;color:var(--primary);min-width:34px;text-align:right}
.header-user{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid transparent}
.header-user:hover{background:var(--bg);border-color:var(--border)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);background:#FFF5F5}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px}
.menu-toggle:hover{background:var(--bg)}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-head{padding:20px 16px 12px;border-bottom:1px solid var(--sidebar-border);flex-shrink:0}
.sidebar-head-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.sidebar-prog-wrap{background:rgba(255,255,255,.05);border-radius:10px;padding:12px 14px}
.sidebar-prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sidebar-prog-label{font-size:12px;color:rgba(255,255,255,.5)}
.sidebar-prog-pct{font-size:14px;font-weight:700;color:#fff}
.sidebar-prog-track{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.sidebar-prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),#8B5CF6);border-radius:2px;transition:width .6s}
.sidebar-modules{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-modules::-webkit-scrollbar{width:4px}
.sidebar-modules::-webkit-scrollbar-track{background:transparent}
.sidebar-modules::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.phase-group{margin-bottom:4px}
.phase-label{display:flex;align-items:center;gap:8px;padding:10px 16px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.3)}
.phase-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.module-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;position:relative;margin:1px 8px;border-radius:10px}
.module-item:hover{background:rgba(255,255,255,.06)}
.module-item.active{background:rgba(99,102,241,.2)}
.module-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--primary);border-radius:0 2px 2px 0}
.mod-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;border:1.5px solid rgba(255,255,255,.1)}
.mod-icon.done{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);color:#10B981}
.mod-icon.current{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.5);color:#818CF8}
.mod-icon.pending{background:rgba(255,255,255,.04);color:rgba(255,255,255,.25)}
.mod-info{flex:1;min-width:0}
.mod-title{font-size:13px;font-weight:500;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.module-item.active .mod-title{color:#fff;font-weight:600}
.mod-meta{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px}
.mod-check{font-size:10px;color:#10B981;flex-shrink:0}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.main-inner{max-width:860px;margin:0 auto;padding:28px 32px}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - var(--header-h) - 56px);text-align:center;gap:16px}
.empty-icon-wrap{width:80px;height:80px;background:var(--primary-light);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px}
.empty-title{font-size:20px;font-weight:700;color:var(--text)}
.empty-sub{font-size:14px;color:var(--muted);max-width:320px;line-height:1.6}
.empty-hint{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--muted)}

/* ── MODULE CONTENT ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.module-content{animation:fadeUp .3s ease}

/* Module header */
.mod-header-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:28px 32px;margin-bottom:20px}
.mod-phase-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:14px}
.mod-title-main{font-size:26px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:8px}
.mod-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.mod-badges{display:flex;gap:8px;flex-wrap:wrap}
.mbadge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600}
.mb-default{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.mb-done{background:#DCFCE7;color:#15803D}
.mb-score{background:var(--primary-light);color:var(--primary-dark)}

/* Complete banner */
.complete-banner{background:linear-gradient(135deg,#059669,#10B981);border-radius:16px;padding:20px 28px;display:flex;align-items:center;gap:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(16,185,129,.25)}
.cb-icon{font-size:40px;line-height:1}
.cb-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.cb-sub{font-size:13px;color:rgba(255,255,255,.8)}

/* Section */
.section-card{background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.section-header{padding:18px 24px 0;display:flex;align-items:center;gap:8px}
.section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.section-label{font-size:13px;font-weight:700;color:var(--text)}
.section-body{padding:16px 24px 24px}

/* Video */
.video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;background:#000}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}

/* PDF */
.pdf-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg);border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.pdf-card:hover{border-color:var(--primary);background:var(--primary-light);transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.1)}
.pdf-icon{width:44px;height:44px;background:linear-gradient(135deg,#EF4444,#DC2626);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#fff}
.pdf-info{flex:1}
.pdf-name{font-size:14px;font-weight:600;color:var(--text)}
.pdf-hint{font-size:12px;color:var(--muted);margin-top:2px}
.pdf-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s}
.pdf-btn:hover{background:var(--primary-dark)}

/* Text content */
.text-content{font-size:15px;line-height:1.8;color:#334155}
.text-content h3{font-size:17px;font-weight:700;color:var(--text);margin:20px 0 10px}
.text-content h3:first-child{margin-top:0}
.text-content p{margin-bottom:14px}
.text-content ul,.text-content ol{padding-left:22px;margin-bottom:14px}
.text-content li{margin-bottom:6px}
.text-content strong{color:var(--text);font-weight:600}

/* Complete button */
.complete-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.complete-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.35)}

/* ── QUIZ ── */
.quiz-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.quiz-top{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#0F0E1F,#1E1B4B)}
.quiz-top-title{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.quiz-top-meta{font-size:12px;color:rgba(255,255,255,.5)}
.quiz-body{padding:24px}
.question-block{background:var(--bg);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.q-num{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.q-text{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;background:#fff;font-size:14px;font-weight:500;color:var(--text)}
.option:hover{border-color:var(--primary);background:var(--primary-light)}
.option.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark)}
.option.correct{border-color:var(--success);background:#F0FDF4;color:#166534}
.option.wrong{border-color:var(--danger);background:#FFF5F5;color:#991B1B}
.option input[type=radio]{display:none}
.opt-letter{width:28px;height:28px;border-radius:8px;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;opacity:.6}
.option.selected .opt-letter,.option.correct .opt-letter,.option.wrong .opt-letter{opacity:1}
.quiz-footer{display:flex;gap:12px;padding:0 24px 24px}
.btn-submit{flex:1;padding:14px;background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.35)}
.quiz-result-card{margin:0 24px 24px;border-radius:12px;padding:28px;text-align:center}
.qr-success{background:linear-gradient(135deg,#DCFCE7,#F0FDF4);border:1px solid #BBF7D0}
.qr-fail{background:linear-gradient(135deg,#FEE2E2,#FFF5F5);border:1px solid #FECACA}
.qr-icon{font-size:48px;margin-bottom:12px;line-height:1}
.qr-score{font-size:42px;font-weight:900;margin-bottom:6px}
.qr-success .qr-score{color:#059669}
.qr-fail .qr-score{color:var(--danger)}
.qr-msg{font-size:14px;color:var(--muted);margin-bottom:20px}
.btn-validate{padding:14px 28px;background:linear-gradient(135deg,var(--success),#059669);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-validate:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(16,185,129,.35)}
.btn-retry{padding:14px 28px;background:#fff;color:var(--text);border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-retry:hover{border-color:var(--text);background:var(--bg)}
.quiz-result-done{margin:0 24px 24px;border-radius:12px;padding:24px;background:linear-gradient(135deg,#DCFCE7,#F0FDF4);border:1px solid #BBF7D0;display:flex;align-items:center;gap:16px}
.qrd-icon{font-size:36px}
.qrd-title{font-size:15px;font-weight:700;color:#166534;margin-bottom:2px}
.qrd-sub{font-size:13px;color:#4ADE80}

/* ── NEXT MODULE ── */
.next-module-card{background:linear-gradient(135deg,#1E1B4B,var(--primary-dark));border-radius:16px;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:16px;cursor:pointer;transition:all .2s}
.next-module-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,70,229,.3)}
.nm-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.nm-title{font-size:15px;font-weight:700;color:#fff}
.nm-arrow{font-size:24px;color:rgba(255,255,255,.6)}

/* ── MOBILE ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;backdrop-filter:blur(2px)}
@media(max-width:768px){
  :root{--sidebar-w:280px}
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:50;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .menu-toggle{display:block}
  .main-inner{padding:20px 16px}
  .header-prog{display:none}
  .mod-title-main{font-size:20px}
  .mod-header-card{padding:20px}
  .quiz-body{padding:16px}
}
</style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="loading-screen">
    <div class="load-logo"><img src="../assets/logo.png" alt=""></div>
    <div class="load-bar"><div class="load-bar-fill"></div></div>
    <div class="load-text">Chargement de votre espace…</div>
  </div>

  <!-- APP -->
  <div id="main-app" style="display:none;flex-direction:column;height:100vh">

    <!-- HEADER -->
    <header class="header">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="header-logo">
        <img src="../assets/logo.png" alt="Denem Academy">
        <div class="header-logo-name">Denem <span>Academy</span></div>
      </div>
      <div class="header-prog">
        <span class="header-prog-label">Progression</span>
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <span class="prog-pct" id="prog-pct">0%</span>
      </div>
      <div class="header-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="user-name">…</span>
      </div>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </header>

    <!-- BODY -->
    <div class="body">

      <!-- OVERLAY MOBILE -->
      <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-head-title">Ma formation</div>
          <div class="sidebar-prog-wrap">
            <div class="sidebar-prog-top">
              <span class="sidebar-prog-label">Avancement global</span>
              <span class="sidebar-prog-pct" id="sidebar-pct">0%</span>
            </div>
            <div class="sidebar-prog-track"><div class="sidebar-prog-fill" id="sidebar-fill" style="width:0%"></div></div>
          </div>
        </div>
        <div class="sidebar-modules" id="module-list"></div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main" id="main-area">
        <div class="main-inner">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon-wrap">👆</div>
            <div class="empty-title">Choisissez un module</div>
            <div class="empty-sub">Sélectionnez un module dans la liste à gauche pour commencer votre apprentissage.</div>
            <div class="empty-hint">💡 Les modules complétés apparaissent en vert</div>
          </div>
          <div id="module-content" style="display:none"></div>
        </div>
      </main>

    </div>
  </div>
</div>

<script>
const FB={apiKey:"AIzaSyBdNN-iiK5KoBqkX4FX1PJ5CmlWUma8NaU",authDomain:"denem-academy-5de41.firebaseapp.com",projectId:"denem-academy-5de41",storageBucket:"denem-academy-5de41.firebasestorage.app",messagingSenderId:"570632584566",appId:"1:570632584566:web:ea9b964787b40805a7ce57"};
firebase.initializeApp(FB);
const auth=firebase.auth();
const db=firebase.firestore();
const TS=()=>firebase.firestore.FieldValue.serverTimestamp();
const BASE=location.pathname.startsWith('/suivi-apprenants')?'/suivi-apprenants':'';

let S={user:null,userData:null,apprenant:null,modules:[],progressions:{},currentModule:null,quizAnswers:{},quizSubmitted:false};

const PHASE_CFG={
  onboarding:{label:"Onboarding",icon:"🚀",color:"#8B5CF6"},
  formation:{label:"Formation",icon:"📚",color:"#3B82F6"},
  pratique:{label:"Mise en pratique",icon:"⚡",color:"#10B981"},
  finalisation:{label:"Finalisation",icon:"🏁",color:"#F59E0B"},
};

// ── AUTH ──
auth.onAuthStateChanged(async user=>{
  if(!user){location.href=BASE+'/login/';return;}
  const doc=await db.collection("users").doc(user.uid).get();
  if(!doc.exists){location.href=BASE+'/login/';return;}
  const userData=doc.data();
  if(userData.role!=='student'){
    location.href=userData.role==='admin'?BASE+'/admin/':BASE+'/';return;
  }
  S.user=user;S.userData=userData;
  const prenom=userData.prenom||user.email;
  document.getElementById("user-name").textContent=prenom;
  document.getElementById("user-avatar").textContent=prenom.charAt(0).toUpperCase();
  try{
    const appSnap=await db.collection("apprenants").where("email","==",user.email).limit(1).get();
    if(!appSnap.empty)S.apprenant={id:appSnap.docs[0].id,...appSnap.docs[0].data()};
  }catch(e){console.warn(e);}
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("main-app").style.display="flex";
  if(!S.apprenant){
    const w=document.createElement("div");
    w.style.cssText="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#FEF3C7;color:#92400E;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:90vw;text-align:center";
    w.textContent="⚠️ Votre dossier apprenant n'est pas encore créé. Contactez votre chargé de suivi.";
    document.body.appendChild(w);
  }
  loadData();
});

// ── DATA ──
function loadData(){
  db.collection("modules").onSnapshot(snap=>{
    S.modules=snap.docs.map(d=>({id:d.id,...d.data()})).filter(m=>m.published).sort((a,b)=>(a.ordre||0)-(b.ordre||0));
    renderSidebar();updateProgress();
    if(S.currentModule){const fresh=S.modules.find(m=>m.id===S.currentModule.id);if(fresh)S.currentModule=fresh;}
  },err=>console.error(err));
  if(S.apprenant){
    db.collection("progressions").onSnapshot(snap=>{
      S.progressions={};
      snap.docs.filter(d=>d.data().apprenant_id===S.apprenant.id).forEach(d=>{S.progressions[d.data().module_id]=d.data();});
      renderSidebar();updateProgress();
      if(S.currentModule)renderModule(S.currentModule);
    },err=>console.error(err));
  }
}

// ── PROGRESS ──
function updateProgress(){
  const total=S.modules.length;if(!total)return;
  const done=Object.values(S.progressions).filter(p=>p.statut==="termine").length;
  const pct=Math.round((done/total)*100);
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-pct").textContent=pct+"%";
  document.getElementById("sidebar-fill").style.width=pct+"%";
  document.getElementById("sidebar-pct").textContent=pct+"%";
}

// ── SIDEBAR ──
function renderSidebar(){
  const phases=Object.entries(PHASE_CFG);
  let html='';
  phases.forEach(([id,cfg])=>{
    const mods=S.modules.filter(m=>m.phase_id===id);
    if(!mods.length)return;
    html+=`<div class="phase-group">
      <div class="phase-label"><div class="phase-dot" style="background:${cfg.color}"></div>${cfg.icon} ${cfg.label}</div>`;
    mods.forEach(m=>{
      const prog=S.progressions[m.id];
      const done=prog?.statut==="termine";
      const isCur=S.currentModule?.id===m.id;
      const cls=done?"done":isCur?"current":"pending";
      const icon=done?"✓":isCur?"▶":"○";
      html+=`<div class="module-item${isCur?" active":""}" onclick="selectModule('${m.id}')">
        <div class="mod-icon ${cls}">${icon}</div>
        <div class="mod-info">
          <div class="mod-title">${m.titre}</div>
          <div class="mod-meta">${m.duree_estimee||""}${done?" · Complété":""}</div>
        </div>
        ${done?`<div class="mod-check">✅</div>`:""}
      </div>`;
    });
    html+='</div>';
  });
  if(!html)html=`<div style="padding:24px 16px;text-align:center;color:rgba(255,255,255,.3);font-size:13px;line-height:1.6">Aucun module<br>disponible pour l'instant.</div>`;
  document.getElementById("module-list").innerHTML=html;
}

// ── SELECT MODULE ──
function selectModule(id){
  const m=S.modules.find(x=>x.id===id);
  if(!m)return;
  S.currentModule=m;S.quizAnswers={};S.quizSubmitted=false;
  renderSidebar();
  document.getElementById("empty-state").style.display="none";
  document.getElementById("module-content").style.display="block";
  renderModule(m);
  // Close sidebar on mobile
  if(window.innerWidth<768)toggleSidebar(false);
  document.getElementById("main-area").scrollTo(0,0);
}

// ── RENDER MODULE ──
function renderModule(m){
  const prog=S.progressions[m.id];
  const isDone=prog?.statut==="termine";
  const cfg=PHASE_CFG[m.phase_id]||{label:m.phase_id,color:"#6366F1",icon:"📋"};
  const embedUrl=getVideoEmbed(m.video_url);
  let html='<div class="module-content">';

  // Complete banner
  if(isDone){
    html+=`<div class="complete-banner">
      <div class="cb-icon">🏆</div>
      <div>
        <div class="cb-title">Module complété avec succès !</div>
        <div class="cb-sub">Score : ${prog.score_quiz||100}% — Continuez sur votre lancée !</div>
      </div>
    </div>`;
  }

  // Header card
  html+=`<div class="mod-header-card">
    <div class="mod-phase-tag" style="background:${cfg.color}18;color:${cfg.color}">${cfg.icon} ${cfg.label}</div>
    <div class="mod-title-main">${m.titre}</div>
    ${m.description?`<div class="mod-desc">${m.description}</div>`:""}
    <div class="mod-badges">
      ${embedUrl?`<span class="mbadge mb-default">🎬 Vidéo</span>`:""}
      ${m.pdf_url?`<span class="mbadge mb-default">📄 PDF</span>`:""}
      ${m.quiz?.length?`<span class="mbadge mb-default">📝 ${m.quiz.length} question${m.quiz.length>1?"s":""}</span>`:""}
      ${m.duree_estimee?`<span class="mbadge mb-default">⏱ ${m.duree_estimee}</span>`:""}
      ${isDone?`<span class="mbadge mb-done">✅ Complété</span>`:""}
      ${isDone&&prog.score_quiz?`<span class="mbadge mb-score">🏆 ${prog.score_quiz}%</span>`:""}
    </div>
  </div>`;

  // Video
  if(embedUrl){
    html+=`<div class="section-card">
      <div class="section-header">
        <div class="section-icon" style="background:#FEE2E2">🎬</div>
        <div class="section-label">Vidéo du cours</div>
      </div>
      <div class="section-body"><div class="video-wrap"><iframe src="${embedUrl}" frameborder="0" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share"></iframe></div></div>
    </div>`;
  }

  // PDF
  if(m.pdf_url){
    html+=`<div class="section-card">
      <div class="section-header">
        <div class="section-icon" style="background:#FEE2E2">📄</div>
        <div class="section-label">Support de cours</div>
      </div>
      <div class="section-body">
        <div class="pdf-card" onclick="window.open('${m.pdf_url}','_blank')">
          <div class="pdf-icon">PDF</div>
          <div class="pdf-info">
            <div class="pdf-name">${m.pdf_nom||"Support de cours"}</div>
            <div class="pdf-hint">Cliquer pour ouvrir dans un nouvel onglet</div>
          </div>
          <button class="pdf-btn">Ouvrir →</button>
        </div>
      </div>
    </div>`;
  }

  // Text content
  if(m.contenu){
    html+=`<div class="section-card">
      <div class="section-header">
        <div class="section-icon" style="background:#EEF2FF">📖</div>
        <div class="section-label">Contenu du cours</div>
      </div>
      <div class="section-body"><div class="text-content">${m.contenu}</div></div>
    </div>`;
  }

  // Quiz or complete button
  if(m.quiz&&m.quiz.length){
    html+=renderQuizHTML(m,isDone,prog);
  } else if(!isDone){
    html+=`<button class="complete-btn" onclick="completeModule('${m.id}',100)">
      ✅ Marquer comme complété et continuer
    </button>`;
  }

  // Next module
  if(isDone){
    const idx=S.modules.findIndex(x=>x.id===m.id);
    const next=S.modules[idx+1];
    if(next){
      html+=`<div class="next-module-card" onclick="selectModule('${next.id}')">
        <div>
          <div class="nm-label">Prochain module</div>
          <div class="nm-title">${next.titre}</div>
        </div>
        <div class="nm-arrow">→</div>
      </div>`;
    }
  }

  html+='</div>';
  document.getElementById("module-content").innerHTML=html;
}

// ── QUIZ HTML ──
function renderQuizHTML(m,isDone,prog){
  if(isDone&&prog){
    return`<div class="quiz-card">
      <div class="quiz-top"><div class="quiz-top-title">📝 Quiz de validation</div></div>
      <div class="quiz-result-done">
        <div class="qrd-icon">🏆</div>
        <div>
          <div class="qrd-title">Quiz réussi — ${prog.score_quiz}%</div>
          <div class="qrd-sub">Module complété avec succès</div>
        </div>
      </div>
    </div>`;
  }
  const letters=['A','B','C','D'];
  let html=`<div class="quiz-card">
    <div class="quiz-top">
      <div class="quiz-top-title">📝 Quiz de validation</div>
      <div class="quiz-top-meta">${m.quiz.length} question${m.quiz.length>1?"s":""} · min. ${m.score_minimum||70}% pour valider</div>
    </div>
    <div class="quiz-body">`;
  m.quiz.forEach((q,qi)=>{
    html+=`<div class="question-block">
      <div class="q-num">Question ${qi+1} / ${m.quiz.length}</div>
      <div class="q-text">${q.texte||q.question||""}</div>
      <div class="options">`;
    (q.options||[]).forEach((opt,oi)=>{
      html+=`<label class="option" id="opt-${qi}-${oi}" onclick="selectAnswer(${qi},${oi})">
        <input type="radio" name="q${qi}" value="${oi}">
        <span class="opt-letter">${letters[oi]}</span>
        <span>${opt}</span>
      </label>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>
    <div class="quiz-footer">
      <button class="btn-submit" onclick="submitQuiz('${m.id}')">Valider mes réponses →</button>
    </div>
    <div id="quiz-result-area"></div>
  </div>`;
  return html;
}

// ── QUIZ LOGIC ──
function selectAnswer(qi,oi){
  S.quizAnswers[qi]=oi;
  document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`)?.classList.add('selected');
}

async function submitQuiz(moduleId){
  if(S.quizSubmitted)return;
  const m=S.modules.find(x=>x.id===moduleId);
  if(!m?.quiz)return;
  const unanswered=m.quiz.findIndex((_,i)=>S.quizAnswers[i]===undefined);
  if(unanswered>=0){alert(`Veuillez répondre à la question ${unanswered+1}.`);return;}
  S.quizSubmitted=true;
  let correct=0;
  m.quiz.forEach((q,qi)=>{
    const ua=S.quizAnswers[qi];
    const ok=ua===q.correct;
    if(ok)correct++;
    document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach(el=>{
      el.style.pointerEvents='none';
      const oi=parseInt(el.id.split('-')[2]);
      if(oi===q.correct)el.classList.add('correct');
      else if(oi===ua&&!ok)el.classList.add('wrong');
    });
  });
  const score=Math.round((correct/m.quiz.length)*100);
  const passed=score>=(m.score_minimum||70);
  const area=document.getElementById("quiz-result-area");
  document.querySelector('.btn-submit')?.remove();
  if(passed){
    area.innerHTML=`<div class="quiz-result-card qr-success">
      <div class="qr-icon">🎉</div>
      <div class="qr-score">${score}%</div>
      <div class="qr-msg">${correct} / ${m.quiz.length} bonnes réponses — Bravo !</div>
      <button class="btn-validate" onclick="completeModule('${moduleId}',${score})">Valider et continuer →</button>
    </div>`;
  } else {
    area.innerHTML=`<div class="quiz-result-card qr-fail">
      <div class="qr-icon">😔</div>
      <div class="qr-score">${score}%</div>
      <div class="qr-msg">${correct} / ${m.quiz.length} bonnes réponses · Minimum requis : ${m.score_minimum||70}%</div>
      <button class="btn-retry" onclick="retryQuiz('${moduleId}')">🔄 Réessayer</button>
    </div>`;
  }
}

function retryQuiz(moduleId){
  S.quizAnswers={};S.quizSubmitted=false;
  const m=S.modules.find(x=>x.id===moduleId);
  if(m)renderModule(m);
}

async function completeModule(moduleId,score){
  if(!S.apprenant){alert("Votre compte n'est pas lié à un apprenant. Contactez votre chargé de suivi.");return;}
  const progId=`${S.apprenant.id}_${moduleId}`;
  const progData={apprenant_id:S.apprenant.id,module_id:moduleId,statut:"termine",score_quiz:score,completed_at:TS(),updatedAt:TS()};
  await db.collection("progressions").doc(progId).set(progData,{merge:true});
  S.progressions[moduleId]=progData;
  const m=S.modules.find(x=>x.id===moduleId);
  if(m&&S.apprenant){
    const scores=[...(S.apprenant.modules_scores||Array(9).fill(null))];
    const idx=S.modules.indexOf(m);
    if(idx>=0)scores[idx]=score;
    await db.collection("apprenants").doc(S.apprenant.id).update({
      modules_scores:scores,
      jour:Math.min(90,Math.max(S.apprenant.jour||1,m.jour_fin||S.apprenant.jour||1)),
      updatedAt:TS()
    });
  }
  updateProgress();renderSidebar();renderModule(m||S.currentModule);
}

// ── HELPERS ──
function getVideoEmbed(url){
  if(!url)return null;
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  if(yt)return`https://www.youtube.com/embed/${yt[1]}?rel=0`;
  const vi=url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(vi)return`https://player.vimeo.com/video/${vi[1]}?badge=0&autopause=0`;
  return null;
}
function toggleSidebar(force){
  const s=document.getElementById("sidebar");
  const o=document.getElementById("overlay");
  const open=force!==undefined?force:!s.classList.contains("open");
  s.classList.toggle("open",open);
  o.classList.toggle("open",open);
}
function logout(){auth.signOut().then(()=>location.href=BASE+'/login/');}
</script>
