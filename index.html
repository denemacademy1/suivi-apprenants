<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="assets/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denem Academy — Connexion</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1E1B4B 0%,#4F46E5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:80px;height:80px;border-radius:16px;margin:0 auto 12px;overflow:hidden}
.logo-title{font-size:22px;font-weight:800;color:#1E293B}
.logo-sub{font-size:13px;color:#64748B;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.form-group input{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;color:#1E293B;outline:none;transition:border .2s;font-family:inherit}
.form-group input:focus{border-color:#4F46E5;box-shadow:0 0 0 3px #EEF2FF}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-primary{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.4)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:#FEE2E2;color:#991B1B;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.error.show{display:block}
.footer-note{text-align:center;font-size:12px;color:#94A3B8;margin-top:20px}
.footer-note a{color:#4F46E5;text-decoration:none;font-weight:500}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1E1B4B,#4F46E5);display:flex;align-items:center;justify-content:center;z-index:100}
.loading-overlay.hidden{display:none}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
</div>

<div class="card" id="card" style="display:none">
  <div class="logo">
    <div class="logo-icon"><img src="assets/logo.png" alt="Denem Academy" style="width:80px;height:80px;object-fit:cover;border-radius:16px"></div>
    <div class="logo-title">Denem Academy</div>
    <div class="logo-sub">Connectez-vous à votre espace</div>
  </div>

  <div id="section-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="votre@email.fr" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Se connecter</button>
    <div class="error" id="login-error"></div>
  </div>

  <div class="footer-note" style="margin-top:14px">
    Pas encore de compte ? <a href="register/">Créer mon compte</a>
  </div>
  <div class="footer-note">
    Problème de connexion ? <a href="mailto:contact@denemacademy.fr">Contactez-nous</a>
  </div>
</div>

<script>
const FB={apiKey:"AIzaSyBdNN-iiK5KoBqkX4FX1PJ5CmlWUma8NaU",authDomain:"denem-academy-5de41.firebaseapp.com",projectId:"denem-academy-5de41",storageBucket:"denem-academy-5de41.firebasestorage.app",messagingSenderId:"570632584566",appId:"1:570632584566:web:ea9b964787b40805a7ce57"};
firebase.initializeApp(FB);
const auth=firebase.auth();
const db=firebase.firestore();

function redirect(role){
  const map={
    student:  'student/',
    csm:      'crm/',
    admin:    'admin/',
    setter:   'setting/',
    closer:   'closing/'
  };
  location.href = map[role] || 'student/';
}

auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      const doc=await db.collection("users").doc(user.uid).get();
      redirect(doc.exists ? doc.data().role : 'student');
    }catch(e){ redirect('student'); }
    return;
  }
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("card").style.display="";
});

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('login-error');
  if(!email||!pwd){showError(err,'Veuillez remplir tous les champs');return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Connexion…';
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pwd);
    const doc=await db.collection("users").doc(cred.user.uid).get();
    redirect(doc.exists ? doc.data().role : 'student');
  }catch(e){
    showError(err,getFrError(e.code));
    btn.disabled=false;btn.textContent='Se connecter';
  }
}

function showError(el,msg){el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4000);}
function getFrError(code){
  const m={
    'auth/user-not-found':'Aucun compte avec cet email.',
    'auth/wrong-password':'Mot de passe incorrect.',
    'auth/invalid-credential':'Email ou mot de passe incorrect.',
    'auth/invalid-email':'Email invalide.',
    'auth/too-many-requests':'Trop de tentatives. Réessayez dans quelques minutes.',
    'auth/user-disabled':'Ce compte a été désactivé.'
  };
  return m[code]||'Une erreur est survenue. Réessayez.';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
